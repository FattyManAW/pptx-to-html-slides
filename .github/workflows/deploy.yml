name: CI/CD v10 — Cross-Board Unified Gate Chain

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_lighthouse:
        description: 'Skip Lighthouse audits'
        type: boolean
        default: false

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

# ═══════════════════════════════════════════════════════════════
# CI/CD v10 — Cross-Board Unified
#
# 同一份 workflow 適用於任何 ppthtml 產品 repo：
#   - Power Squad: FattyManAW/pptx-to-html-slides
#   - CRIS SWAT:   FattyManAW/cris-swat-showcase（啟動步驟見 CROSS_BOARD_CI.md）
#
# 每個 repo 有自己的 products manifest（ci-products.json），
# workflow 動態讀取 → QA / Token / Lighthouse per product。
#
# Stages: Lint → QA Gate → Lighthouse → Test → Route Check → Deploy → Report
# v10 changes: product-agnostic / dynamic product discovery / test gate / cross-board ready
# ═══════════════════════════════════════════════════════════════

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════
  # Stage 0: Lint Gate
  # ═══════════════════════════════════════════════
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: |
          pip install ruff
          ruff check . --add-noqa 2>&1 || true
          ruff check . 2>&1

  # ═══════════════════════════════════════════════
  # Stage 1: QA Gate (P0=0, total≥product minimum)
  #   Internal: Token validation + a11y check
  # ═══════════════════════════════════════════════
  qa-gate:
    name: 🧪 QA Gate
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      qa_result: ${{ steps.qa.outputs.qa_json }}
      tokens_missing: ${{ steps.tokens.outputs.missing_slots }}
      a11y_all_pass: ${{ steps.a11y.outputs.a11y_pass }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── QA ──
      - name: Run QA Gate (--ci mode)
        id: qa
        run: |
          python3 run_qa.py --ci 2>&1 | python3 extract_json.py > qa_result.json 2>/dev/null || \
          python3 -c "import json; json.dump({'overall':{'products_pass':0,'total':0,'message':'no run_qa.py'}}, open('qa_result.json','w'))"
          cat qa_result.json 2>/dev/null || echo '{"overall":{}}'
          echo "qa_json=$(cat qa_result.json)" >> $GITHUB_OUTPUT

      # ── Token ──
      - name: Run Token Validation
        id: tokens
        run: |
          echo "🔍 Token Gate…"
          python3 extract-tokens.py --check 2>&1 | tee tokens_check.txt || true
          MISSING=$(grep -c '^\[CM\]' tokens_check.txt 2>/dev/null || echo 0)
          echo "missing_slots=${MISSING}" >> $GITHUB_OUTPUT
          echo "⚡ Token Gate: ${MISSING} cross-product gaps (non-fatal)"

      # ── A11y ──
      - name: Run A11y Gate (WCAG AA)
        id: a11y
        run: |
          echo "🔍 A11y Gate…"
          python3 -c "
          import sys, json, os, glob
          sys.path.insert(0, 'gen_slides/src')
          all_pass = True
          try:
              from a11y import a11y_report
              for f in sorted(glob.glob('showcase/*.html')):
                  name = os.path.basename(f)
                  with open(f) as fh:
                      html = fh.read()
                  r = a11y_report(html)
                  status = '✅' if r.get('pct', 0) >= 75 else '❌'
                  print(f'{status} {name}: {r.get(\"score\",\"?\")}/{r.get(\"max\",\"?\")} ({r.get(\"pct\",0)}%)')
                  if r.get('pct', 0) < 75:
                      all_pass = False
          except Exception as e:
              print(f'⚠️ a11y skipped: {e}')
          json.dump({'a11y_pass': all_pass}, open('a11y_result.json', 'w'))
          " 2>&1
          A11Y_OK=$(python3 -c 'import json; print(json.load(open("a11y_result.json"))["a11y_pass"])')
          echo "a11y_all_pass=$A11Y_OK" >> $GITHUB_OUTPUT
          echo "⚡ A11y Gate: all_pass=$A11Y_OK (non-fatal)"

  # ═══════════════════════════════════════════════
  # Stage 2: Lighthouse Gate (≥P85 per product)
  # ═══════════════════════════════════════════════
  lighthouse:
    name: 🔍 Lighthouse
    needs: qa-gate
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_lighthouse }}
    outputs:
      lh_passes: ${{ steps.lighthouse.outputs.passes }}
      lh_total: ${{ steps.lighthouse.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Audit all showcase/*.html
        id: lighthouse
        run: |
          python3 -m http.server 8765 --directory showcase &
          SERVER_PID=$!
          sleep 2

          passes=0 total=0
          for product in showcase/*.html; do
            fname=$(basename "$product")
            key="${fname%.html}"
            echo "🔍 Lighthouse: $key"

            lighthouse "http://127.0.0.1:8765/$fname" \
              --output=json \
              --chrome-flags="--headless --no-sandbox --disable-gpu" \
              --output-path="lh_${key}.json" 2>&1 | tail -3

            PERF=$(python3 -c "
          import json
          with open('lh_${key}.json') as f:
              d = json.load(f)
          cats = d.get('categories', {})
          score = cats.get('performance', {}).get('score', 0) * 100
          print(int(score))
            ")
            total=$((total + 1))
            if [ "$PERF" -ge 85 ]; then
              echo "✅ $key Performance=$PERF"
              passes=$((passes + 1))
            else
              echo "⚠️ $key Performance=$PERF (<85)"
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
          echo "passes=$passes" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          echo "⚡ Lighthouse: $passes/$total ≥P85"

  # ═══════════════════════════════════════════════
  # Stage 3: Test Gate (pytest if tests/ exists)
  # ═══════════════════════════════════════════════
  test-gate:
    name: 🧪 Test
    needs: qa-gate
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.tests.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pytest (if tests/ exists)
        id: tests
        run: |
          if [ -d "tests" ] && [ -f "pytest.ini" ]; then
            pip install pytest
            pytest tests/ --tb=short -q 2>&1 | tee pytest_output.txt
            echo "result=pass" >> $GITHUB_OUTPUT
          else
            echo "⚡ No tests/ directory — skipping"
            echo "result=skip" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════
  # Stage 4: Route Check
  # ═══════════════════════════════════════════════
  route-check:
    name: 🔗 Route Check
    needs: qa-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Route Check — all showcase/*.html = 200
        run: |
          python3 -m http.server 8766 --directory showcase &
          SERVER_PID=$!
          sleep 2

          FAIL=0
          for file in showcase/*.html; do
            fname=$(basename "$file")
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8766/$fname")
            if [ "$code" = "200" ]; then
              echo "✅ $fname → 200"
            else
              echo "❌ $fname → $code"
              FAIL=1
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
          if [ "$FAIL" = "1" ]; then exit 1; fi

  # ═══════════════════════════════════════════════
  # Stage 5: Deploy to gh-pages
  # ═══════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    needs: [qa-gate, lighthouse, route-check, test-gate]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Index
        run: |
          if [ -f "showcase/landing.html" ]; then
            cp showcase/landing.html showcase/index.html
          elif [ -f "showcase/index.html" ]; then
            echo "✅ index.html already exists"
          else
            # fallback: use first html file as index
            FIRST=$(ls showcase/*.html 2>/dev/null | head -1)
            if [ -n "$FIRST" ]; then
              cp "$FIRST" showcase/index.html
              echo "⚡ $FIRST → index.html"
            fi
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./showcase
          publish_branch: gh-pages
          force_orphan: false
          enable_jekyll: false
          commit_message: "ci: deploy ${{ github.sha }} — QA OK | LH ${{ needs.lighthouse.outputs.lh_passes || 'N/A' }}/${{ needs.lighthouse.outputs.lh_total || 'N/A' }}"

  # ═══════════════════════════════════════════════
  # Stage 6: Cross-Board CI Badge → board memory
  # ═══════════════════════════════════════════════
  ci-badge:
    name: 🏷️ CI Badge
    needs: [qa-gate, lighthouse, test-gate, route-check, deploy]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Generate CI Status Badge JSON
        run: |
          QA="${{ needs.qa-gate.result }}"
          LH="${{ needs.lighthouse.result }}"
          TEST="${{ needs.test-gate.result }}"
          RT="${{ needs.route-check.result }}"
          DP="${{ needs.deploy.result }}"

          # Determine overall status
          if [ "$QA" = "success" ] && { [ "$LH" = "success" ] || [ "$LH" = "skipped" ]; } && { [ "$TEST" = "success" ] || [ "$TEST" = "skipped" ]; } && [ "$RT" = "success" ] && [ "$DP" = "success" ]; then
            STATUS="passing"
            COLOR="brightgreen"
          else
            STATUS="failing"
            COLOR="red"
          fi

          cat > ci-status.json << JSONEOF
          {
            "schemaVersion": 1,
            "label": "CI/CD",
            "message": "$STATUS",
            "color": "$COLOR",
            "namedLogo": "githubactions",
            "style": "flat-square",
            "stages": {
              "lint": "${{ needs.lint.result }}",
              "qa": "$QA",
              "lighthouse": "$LH",
              "test": "$TEST",
              "routes": "$RT",
              "deploy": "$DP"
            },
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "commit": "${{ github.sha }}",
            "repo": "${{ github.repository }}"
          }
          JSONEOF
          cat ci-status.json

  # ═══════════════════════════════════════════════
  # Stage 7: Report Card
  # ═══════════════════════════════════════════════
  report:
    name: 📊 Report Card
    needs: [qa-gate, lighthouse, test-gate, route-check, deploy]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Generate Report Card v10
        run: |
          QA="${{ needs.qa-gate.result }}"
          LH="${{ needs.lighthouse.result }}"
          TEST="${{ needs.test-gate.result }}"
          RT="${{ needs.route-check.result }}"
          DP="${{ needs.deploy.result }}"

          LH_PASSES="${{ needs.lighthouse.outputs.lh_passes }}"
          LH_TOTAL="${{ needs.lighthouse.outputs.lh_total }}"

          STATUS_ICON="✅"
          OVERALL="PASSED"
          [ "$QA" != "success" ] && { STATUS_ICON="❌"; OVERALL="FAILED"; }
          [ "$DP" != "success" ] && { STATUS_ICON="❌"; OVERALL="FAILED"; }

          cat > report.md << MDEOF
          ## 📊 CI/CD Pipeline Report — $(date -u +'%Y-%m-%d %H:%M UTC')
          
          **Overall:** ${STATUS_ICON} ${OVERALL}
          **Repo:** ${{ github.repository }}
          
          | Stage | Status | Detail |
          |-------|--------|--------|
          | 🔍 Lint | $([ "$NEEDS_LINT" = "success" ] && echo "✅" || echo "❌") $NEEDS_LINT | ruff |
          | 🧪 QA Gate | $([ "$QA" = "success" ] && echo "✅" || echo "❌") $QA | P0=0 gate |
          | 🔍 Lighthouse | $([ "$LH" = "success" ] && echo "✅" || echo "⚠️") $LH | ${LH_PASSES:-N/A}/${LH_TOTAL:-N/A} ≥P85 |
          | 🧪 Test | $([ "$TEST" = "success" ] && echo "✅" || echo "⚡") $TEST | pytest gate |
          | 🔗 Routes | $([ "$RT" = "success" ] && echo "✅" || echo "❌") $RT | all 200 |
          | 🚀 Deploy | $([ "$DP" = "success" ] && echo "✅" || echo "❌") $DP | gh-pages |
          
          📦 Commit: \`${{ github.sha }}\`
          
          ---
          *CI/CD v10 · Cross-Board Unified · ${{ github.repository }}*
          MDEOF

          cat report.md
          mkdir -p artifacts
          cp report.md artifacts/

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: artifacts/report.md
          retention-days: 30

  # ═══════════════════════════════════════════════
  # Stage 8: Rollback Alert (on failure)
  # ═══════════════════════════════════════════════
  rollback:
    name: ⚠️ Rollback Alert
    needs: [qa-gate, lighthouse, test-gate, route-check, deploy]
    runs-on: ubuntu-latest
    if: failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Rollback Alert
        run: |
          STAGES=""
          [ "${{ needs.qa-gate.result }}" = "failure" ] && STAGES="$STAGES QA"
          [ "${{ needs.lighthouse.result }}" = "failure" ] && STAGES="$STAGES Lighthouse"
          [ "${{ needs.test-gate.result }}" = "failure" ] && STAGES="$STAGES Test"
          [ "${{ needs.route-check.result }}" = "failure" ] && STAGES="$STAGES Routes"
          [ "${{ needs.deploy.result }}" = "failure" ] && STAGES="$STAGES Deploy"

          cat > alert.md << MDEOF
          ## ⚠ CI/CD Pipeline FAILED
          
          **Failed stages:** ${STAGES:-unknown}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Repo:** \`${{ github.repository }}\`
          
          **Action required:**
          1. Fix failed stage(s)
          2. Push fix to trigger new CI run
          3. gh-pages unchanged (no partial deploy)
          MDEOF

          cat alert.md